<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>燕云十六声 · 江湖人格测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            background: #1a1e1b;
            background-image: radial-gradient(circle at 20% 30%, #2a3a2a 0%, #0f1410 100%);
            min-height: 100vh;
            color: #e6e0d0;
            padding: 20px 12px 40px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .test-card {
            background: rgba(25, 35, 25, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #b8a88c;
            border-radius: 32px;
            padding: 28px 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(220,200,160,0.15);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 8px;
            text-align: center;
            color: #d4c8b0;
            text-shadow: 0 2px 6px #00000050;
            margin-bottom: 6px;
        }
        .subhead {
            text-align: center;
            font-size: 0.9rem;
            color: #b8a98a;
            border-bottom: 1px dashed #7e8d6e;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        .progress-area {
            margin-bottom: 28px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #c0b79a;
        }
        .progress-bar-bg {
            height: 6px;
            background: #2a3228;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 6px;
            background: linear-gradient(90deg, #a1b89a, #cfc3a0);
            width: 0%;
            border-radius: 10px;
        }
        .q-num {
            font-size: 0.85rem;
            color: #a7b69c;
            margin-bottom: 12px;
            border-left: 3px solid #b89a6a;
            padding-left: 12px;
        }
        .q-text {
            font-size: 1.3rem;
            line-height: 1.4;
            margin-bottom: 28px;
            color: #efe6d4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background: rgba(30, 40, 30, 0.7);
            border: 1px solid #5f6e52;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #ded3bd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option.selected {
            background: #4a6240;
            border-color: #dac29c;
            box-shadow: 0 0 12px #b9a57780;
        }
        .option-prefix {
            font-weight: bold;
            margin-right: 12px;
            color: #cdbb98;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            background: #2a3527;
            border: 1px solid #7f9470;
            color: #efe0c6;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 48px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-family: inherit;
            transition: all 0.15s;
        }
        .btn:active {
            background: #3e5437;
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .result-panel {
            text-align: center;
        }
        .result-badge {
            font-size: 4rem;
            letter-spacing: 6px;
            color: #e6d8b8;
            margin: 15px 0;
            text-shadow: 0 0 12px #9bb87b60;
        }
        .result-title {
            font-size: 2rem;
            color: #f1e7cf;
            margin-bottom: 8px;
        }
        .result-desc {
            font-size: 1rem;
            padding: 10px 20px;
            color: #ccc2a8;
            margin-bottom: 25px;
            background: #1f2a1c80;
            border-radius: 40px;
            display: inline-block;
        }
        .dimension-detail {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            background: #1f281bb0;
            padding: 18px;
            border-radius: 60px;
        }
        .dim-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dim-label {
            font-size: 0.8rem;
            color: #b1aa91;
        }
        .dim-value {
            font-size: 1.8rem;
            color: #efe0bc;
        }
        .share-btn {
            background: #4a5a3a;
            border: 1px solid #c0b080;
            margin-bottom: 12px;
        }
        .share-btn:active {
            background: #5e7250;
        }
        .reset-btn {
            background: #3f4e34;
            border: 1px solid #bcae84;
            width: 100%;
        }
        .hidden {
            display: none !important;
        }
        .toast-tip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a1ab0;
            backdrop-filter: blur(8px);
            color: #efe6d0;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #b8a06e;
            font-size: 1rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-tip.show {
            opacity: 1;
        }
        footer {
            margin-top: 20px;
            color: #6a7a5e;
            text-align: center;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="test-card">
        <h1>燕云·十六声</h1>
        <div class="subhead">—— 江 湖 人 格 录 ——</div>

        <div id="testArea">
            <div class="progress-area">
                <div class="progress-text">
                    <span id="currentQDisplay">第 1 / 50 问</span>
                    <span id="progressPercent">2%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill" style="width:2%"></div>
                </div>
            </div>
            <div class="question-panel">
                <div class="q-num" id="qNumLabel">第一问 · 入世</div>
                <div class="q-text" id="qText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="nav-buttons">
                <button class="btn" id="prevBtn">← 上一问</button>
                <button class="btn" id="nextBtn">下一问 →</button>
            </div>
        </div>

        <div id="resultArea" class="result-panel hidden">
            <div style="color:#b8a98a;">你的江湖人格</div>
            <div class="result-badge" id="resultCode">ISTJ</div>
            <div class="result-title" id="resultName">清河拾荒者</div>
            <div class="result-desc" id="resultDesc">全收集党，图鉴清道夫，觉瘴林生存专家</div>
            <div class="dimension-detail" id="dimensionDetail"></div>
            <button class="btn share-btn" id="shareLinkBtn">📋 复制链接 · 邀友同测</button>
            <button class="btn reset-btn" id="resetBtn">重入江湖 · 再测一次</button>
            <p style="margin-top:18px;color:#9a9f84;">—— 燕云风起，自有归途 ——</p>
        </div>
    </div>
    <footer>策马江湖 · 随心而答</footer>
</div>

<div id="toastMessage" class="toast-tip">链接已复制</div>

<script>
(function(){
    "use strict";

    // ========== 最终版题库 50题 A/B二选一 ==========
    const questions = [
        "刚进游戏的第一件事是？",
        "打完副本后，你通常？",
        "在附近频道看到一群玩家在闲聊，你会？",
        "遇到解决不了的事",
        "百业组织集体活动，你的态度？",
        "你在游戏中最享受的状态",
        "论剑场连输三把，你会？",
        "你建家业主要是为了？",
        "关于限时活动，你倾向于？",
        "如果副本强制只能匹配路人？",
        "发现一个绝美拍照点，你会？",
        "你心中的\"江湖朋友\"更像是？",
        "新出的武学你的关注点是",
        "地图上未收集完的区域，你的驱动力是？",
        "关于家业，你更在意？",
        "关于觉瘴林，你印象最深的是？",
        "你如何看待装备词条？",
        "做主线任务时，你对剧情的态度是？",
        "探索时发现燕云的小巧思，你的反应是？",
        "当你做采集时你会？",
        "你更喜欢哪种战斗风格？",
        "燕云里的文物和考据内容，你？",
        "对于副本机制，你的学习方式是？",
        "你如何看待游戏里的成就系统？",
        "挑选一套新时装，你的标准是？",
        "有人生病求助你会？",
        "一件衣服成套很丑但混搭后好看，你会？",
        "看到有人在欺负人你会？",
        "百业里有人求带副本，但你本来打算做其他的，你会？",
        "打论剑时遇到小代或路人王，你会？",
        "家业住宅选址，你更看重？",
        "一个万事知任务需要你做出选择，你会？",
        "队里有人有内鬼导致团灭，你会？",
        "开箱出去龙骨图你会",
        "你如何看待游戏里的悬赏系统？",
        "打本时里有人明显划水，你会？",
        "你选择加入一个百业的首要标准是？",
        "你的包裹整理习惯是？",
        "做江湖声望时，你的习惯是？",
        "探索时发现一个所谓的隐藏宝箱但需要绕路3分钟，收益不如卖菜，你会？",
        "任务做到一半，在路边发现一个天工地窟，你会？",
        "关于游戏里的书籍和信札，你的态度是？",
        "你的家业布局方式是？",
        "对于周一打本的时间，你？",
        "开宝箱做收集前你习惯",
        "看到百业频道上有人喊副本缺一个位置，你会？",
        "你攒了5000W宝钱，你会？",
        "你对游戏版本更新的态度是？",
        "关于武学造诣，你？",
        "如果要你用一句话总结你的想法："
    ];

    const optionTexts = [
        ["打开好友列表找搭子", "看看有没啥活动和任务"],
        ["继续打黑工，或其他活动", "回到单人世界挂机"],
        ["加入聊天，或者看他们聊天", "丝毫不在意"],
        ["寻求好友帮助", "自己死磕到底，绝不多问一句"],
        ["有空必到，人多才好玩", "能推就推，更喜欢一个人"],
        ["和好友组队玩耍", "一个人闲逛做做活动"],
        ["用各种方法分享吐槽", "自己消化情绪"],
        ["请朋友来参观，听夸夸", "单纯升级"],
        ["和好友一起研究合作", "自己一个人享受独享的成就感"],
        ["没问题，匹配到谁都是缘分", "宁愿和人机打也不想和路人打"],
        ["立刻分享给好友", "偷偷收藏，然后美美出片"],
        ["一起玩耍的好搭子", "偶尔一起玩耍就ok"],
        ["武学的伤害、搭配效果、霸体效果、无敌帧等", "武学的美术、整体的操作手感"],
        ["那里的宝箱、图鉴、材料没拿", "单纯好奇该区域接下来的故事"],
        ["单纯给家业升级拿奖励", "建筑的整体意境、光影氛围、环境融合"],
        ["一群老六以及战斗爽", "要来一局紧张刺激的觉瘴林吗？"],
        ["仔细研究每条属性的收益，追求最优配装", "大概看看，差不多能用就行"],
        ["仔细看每一句对话，梳理人物关系", "沉浸在剧情氛围里，感受情绪和意境"],
        ["先试着尝试一下", "好奇会不会和剧情有关联"],
        ["规划最优采集路线", "看到就采，不会特意去采集"],
        ["研究连招压制、抓破绽、计算冷却", "凭感觉打，打出自己的节奏和风格"],
        ["偶尔会看看介绍，但大多直接跳过", "关注并结合真实历史和文物"],
        ["看攻略视频，背时间轴，记技能顺序", "进去灭几次，然后慢慢记住"],
        ["想要全收集", "不强求"],
        ["关注质感、染色、细节和是否符合游戏中的时代", "整体感觉对不对，和角色气质搭不搭"],
        ["没事做就去治病", "直接去治病"],
        ["不穿", "选择混搭"],
        ["事不关己", "帮帮场子"],
        ["看对方是谁，熟人就带", "开麦指挥"],
        ["上了再说，就当学学连招", "摆烂"],
        ["不是很在意", "窗外的风景好不好看、有没有氛围"],
        ["想清楚每个选项的后果和收益再选", "遵从自己内心的第一感觉"],
        ["复盘失误原因，指出问题", "下把再这样就优化了"],
        ["发财了卖了！！！", "自己收集材料自己做"],
        ["研究过悬赏就算不爽对方也会计算付出的代价", "直接让对方飞起来(神鹰哥同款手势)"],
        ["直接指出来", "打本前说好就行"],
        ["百业的要求、福利、活动是否规范", "百业的氛围好不好"],
        ["每次都要点一下整理", "偶尔点一下整理，平时无所谓"],
        ["按固定顺序清完，一条龙不落", "直接觉瘴林见"],
        ["必须去拿，看到后不拿就难受", "记一下位置，以后顺路再来"],
        ["记下位置，任务做完再回来看", "先钻进去探个究竟"],
        ["可能有剧情所以每本必捡必读", "无所谓"],
        ["找到图纸直接套", "想到哪搭到哪，随性发挥"],
        ["记在心里或设闹钟，准时参加", "知道个大概，有时间就参加"],
        ["看视频，标点提前规划路线", "不强求"],
        ["看看自己日常清完了没，有余力就去", "打黑工"],
        ["规划好用途，优先提升战力", "先买八音窍"],
        ["更新后看公告，看看武学有无增强和削弱", "不看公告就是玩"],
        ["有明确的目标和提升计划", "对此没有太大要求"],
        ["目标明确，步步为营", "随心而行，享受当下"]
    ];

    // ========== 维度映射 ==========
    // 1-12: E/I (A=E外向, B=I内向)
    // 13-25: S/N (A=S实感, B=N直觉)
    // 26-37: T/F (A=T理性, B=F情感)
    // 38-50: J/P (A=J判断, B=P感知)

    // ========== 人格库 ==========
    const personalityMap = {
        "ISTJ": ["清河拾荒者", "全收集党，图鉴清道夫，规划至上"],
        "ISFJ": ["青溪守宅人", "佛系建筑师，默默守护，温暖可靠"],
        "INFJ": ["孤云说书人", "沉浸剧情，心怀江湖大义"],
        "INTJ": ["墨山布阵师", "策略大师，独行规划者"],
        "ISTP": ["积粮刺客", "PVP野外独狼，冷静的操作流"],
        "ISFP": ["醉花阴散人", "换装党+风景党，江湖艺术家"],
        "INFP": ["天涯流浪客", "纯粹探索玩家，理想主义江湖客"],
        "INTP": ["天泉问道者", "机制探索党，只对\"为什么\"感兴趣"],
        "ESTP": ["狂澜弄潮儿", "PVP狂热分子，享受竞技快感"],
        "ESFP": ["开封交际花", "社交换装党，哪里有热闹哪里就有我"],
        "ENFP": ["清河探险家", "纯粹探索玩家，好奇驱动一切"],
        "ENTP": ["无名诡辩者", "PVP心理战大师，享受博弈乐趣"],
        "ESTJ": ["天泉大管事", "全收集+效率至上，帮会管理型"],
        "ESFJ": ["青溪掌门人", "PVE团队润滑剂，气氛组担当"],
        "ENFJ": ["江湖引路人", "PVE指挥型，兼济天下的大哥/大姐"],
        "ENTJ": ["开封城主", "目标导向的全能型，什么都要最强"]
    };

    // ========== 状态变量 ==========
    let currentIndex = 0;
    const answers = new Array(50).fill(null);
    let ei = [0, 0], sn = [0, 0], tf = [0, 0], jp = [0, 0];

    // ========== DOM 元素 ==========
    const qText = document.getElementById('qText');
    const optionsDiv = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const testArea = document.getElementById('testArea');
    const resultArea = document.getElementById('resultArea');
    const qNumLabel = document.getElementById('qNumLabel');
    const currentQDisplay = document.getElementById('currentQDisplay');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const toastEl = document.getElementById('toastMessage');

    // ========== 轻提示 ==========
    function showToast(msg) {
        toastEl.textContent = msg || '🔗 链接已复制';
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    // ========== 渲染题目 ==========
    function renderQuestion(index) {
        qText.textContent = questions[index];
        const section = index < 12 ? '入世' : (index < 25 ? '观心' : (index < 37 ? '执念' : '归途'));
        qNumLabel.textContent = `第${index + 1}问 · ${section}`;
        currentQDisplay.textContent = `第 ${index + 1} / 50 问`;
        const pct = Math.round((index + 1) / 50 * 100);
        progressPercent.textContent = pct + '%';
        progressFill.style.width = pct + '%';

        const selected = answers[index];
        let html = '';
        const opts = optionTexts[index];
        for (let i = 0; i < 2; i++) {
            const letter = i === 0 ? 'A' : 'B';
            html += `<div class="option ${selected === i ? 'selected' : ''}" data-opt="${i}"><span class="option-prefix">${letter}</span>${opts[i]}</div>`;
        }
        optionsDiv.innerHTML = html;
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                const opt = parseInt(el.dataset.opt);
                answers[index] = opt;
                renderQuestion(index);
            });
        });
        prevBtn.disabled = (index === 0);
        nextBtn.textContent = index === 49 ? '揭晓人格' : '下一问 →';
    }

    // ========== 计算结果 ==========
    function calculateResult() {
        ei = [0, 0]; sn = [0, 0]; tf = [0, 0]; jp = [0, 0];
        for (let i = 0; i < 50; i++) {
            const ans = answers[i];
            if (ans === null) continue;
            if (i < 12) { if (ans === 0) ei[0]++; else ei[1]++; }
            else if (i < 25) { if (ans === 0) sn[0]++; else sn[1]++; }
            else if (i < 37) { if (ans === 0) tf[0]++; else tf[1]++; }
            else { if (ans === 0) jp[0]++; else jp[1]++; }
        }

        const getLetter = (arr, dimType) => {
            if (arr[0] === arr[1]) return 'X';
            if (dimType === 'EI') return arr[0] > arr[1] ? 'E' : 'I';
            if (dimType === 'SN') return arr[0] > arr[1] ? 'S' : 'N';
            if (dimType === 'TF') return arr[0] > arr[1] ? 'T' : 'F';
            return arr[0] > arr[1] ? 'J' : 'P';
        };

        const e = getLetter(ei, 'EI');
        const s = getLetter(sn, 'SN');
        const t = getLetter(tf, 'TF');
        const j = getLetter(jp, 'JP');
        const code = e + s + t + j;

        let name, desc;
        if (code === 'XXXX') {
            name = '逍遥散人';
            desc = '不强求任何玩法，主打一个自在随缘。';
        } else if (code.includes('X')) {
            name = '江湖散修';
            desc = '你有一面随性自在，但在某些方面仍有自己的坚持与风格。';
        } else {
            const p = personalityMap[code] || ['江湖异人', '身怀绝技，不落窠臼。'];
            name = p[0];
            desc = p[1];
        }

        document.getElementById('resultCode').textContent = code;
        document.getElementById('resultName').textContent = name;
        document.getElementById('resultDesc').textContent = desc;
        document.getElementById('dimensionDetail').innerHTML = `
            <div class="dim-item"><span class="dim-label">精力</span><span class="dim-value">${e}</span></div>
            <div class="dim-item"><span class="dim-label">认知</span><span class="dim-value">${s}</span></div>
            <div class="dim-item"><span class="dim-label">决策</span><span class="dim-value">${t}</span></div>
            <div class="dim-item"><span class="dim-label">处世</span><span class="dim-value">${j}</span></div>
        `;

        testArea.classList.add('hidden');
        resultArea.classList.remove('hidden');
    }

    // ========== 复制分享链接 ==========
    function copyShareLink() {
        const url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('🔗 链接已复制，快去分享给江湖好友！');
            }).catch(() => fallbackCopy(url));
        } else {
            fallbackCopy(url);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('🔗 链接已复制');
        } catch (e) {
            alert('复制失败，请手动复制网址');
        }
        document.body.removeChild(textarea);
    }

    // ========== 事件绑定 ==========
    nextBtn.addEventListener('click', () => {
        if (answers[currentIndex] === null) {
            showToast('请先选择一个选项');
            return;
        }
        if (currentIndex === 49) {
            calculateResult();
        } else {
            currentIndex++;
            renderQuestion(currentIndex);
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion(currentIndex);
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        answers.fill(null);
        currentIndex = 0;
        testArea.classList.remove('hidden');
        resultArea.classList.add('hidden');
        renderQuestion(0);
    });

    document.getElementById('shareLinkBtn').addEventListener('click', copyShareLink);

    // ========== 启动 ==========
    renderQuestion(0);
})();
</script>
</body>
</html>

};

    // ========== 佛系称号库 ==========
   const xTitles = {
    4: ["逍遥散人", "不强求任何玩法，主打一个自在随缘。日常忘了就忘了，副本错过就错过，战力高低无所谓，风景好看就行。江湖这么大，躺着看也挺好。"],
    3: ["江湖隐士", "大隐隐于市，你只在意的领域认真。平时佛系随缘，但碰到来劲的事比谁都较真。江湖人送外号：选择性强迫症患者。"],
    2: ["自在侠客", "有坚持也有随性，江湖路上走得潇洒。该肝的时候绝不含糊，该躺的时候绝不动弹。主打一个张弛有度，收放自如。"],
    1: ["偏锋行者", "大体方向明确，只在某处留有余地。九成的事情你都较真，唯独那一成你说随缘。剑走偏锋，亦有章法。"]
};
    const xNicknames = {
    4: "XIAOYAOSANREN",
    3: "JIANGHUYINSHI",
    2: "ZIZAIXIAKE",
    1: "PIANFENGXINGZHE"
};

    // ========== 状态变量 ==========
    let currentIndex = 0;
    const answers = new Array(50).fill(null);
    let ei = [0, 0, 0], sn = [0, 0, 0], tf = [0, 0, 0], jp = [0, 0, 0];

    // ========== DOM 元素 ==========
    const qText = document.getElementById('qText');
    const optionsDiv = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const testArea = document.getElementById('testArea');
    const resultArea = document.getElementById('resultArea');
    const qNumLabel = document.getElementById('qNumLabel');
    const currentQDisplay = document.getElementById('currentQDisplay');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const toastEl = document.getElementById('toastMessage');

    // ========== 轻提示 ==========
    function showToast(msg) {
        toastEl.textContent = msg || '🔗 链接已复制';
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    // ========== 渲染题目 ==========
    function renderQuestion(index) {
        qText.textContent = questions[index];
        const section = index < 12 ? '入世' : (index < 25 ? '观心' : (index < 37 ? '执念' : '归途'));
        qNumLabel.textContent = `第${index + 1}问 · ${section}`;
        currentQDisplay.textContent = `第 ${index + 1} / 50 问`;
        const pct = Math.round((index + 1) / 50 * 100);
        progressPercent.textContent = pct + '%';
        progressFill.style.width = pct + '%';

        const selected = answers[index];
        let html = '';
        const opts = optionTexts[index];
        for (let i = 0; i < 3; i++) {
            const letter = i === 0 ? 'A' : (i === 1 ? 'B' : 'C');
            html += `<div class="option ${selected === i ? 'selected' : ''}" data-opt="${i}"><span class="option-prefix">${letter}</span>${opts[i]}</div>`;
        }
        optionsDiv.innerHTML = html;
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                const opt = parseInt(el.dataset.opt);
                answers[index] = opt;
                renderQuestion(index);
            });
        });
        prevBtn.disabled = (index === 0);
        nextBtn.textContent = index === 49 ? '揭晓人格' : '下一问 →';
    }

    // ========== 计算结果 ==========
    function calculateResult() {
        ei = [0, 0, 0]; sn = [0, 0, 0]; tf = [0, 0, 0]; jp = [0, 0, 0];
        for (let i = 0; i < 50; i++) {
            const ans = answers[i];
            if (ans === null) continue;
            if (i < 12) { 
                if (ans === 0) ei[0]++; 
                else if (ans === 1) ei[1]++; 
                else ei[2]++; 
            } else if (i < 25) { 
                if (ans === 0) sn[0]++; 
                else if (ans === 1) sn[1]++; 
                else sn[2]++; 
            } else if (i < 37) { 
                if (ans === 0) tf[0]++; 
                else if (ans === 1) tf[1]++; 
                else tf[2]++; 
            } else { 
                if (ans === 0) jp[0]++; 
                else if (ans === 1) jp[1]++; 
                else jp[2]++; 
            }
        }

        const getLetter = (arr, dimType) => {
            const total = arr[0] + arr[1] + arr[2];
            if (total === 0) return 'X';
            if (arr[2] > total * 0.4) return 'X';
            if (dimType === 'EI') return arr[0] >= arr[1] ? 'E' : 'I';
            if (dimType === 'SN') return arr[0] >= arr[1] ? 'S' : 'N';
            if (dimType === 'TF') return arr[0] >= arr[1] ? 'T' : 'F';
            return arr[0] >= arr[1] ? 'J' : 'P';
        };

        const e = getLetter(ei, 'EI');
        const s = getLetter(sn, 'SN');
        const t = getLetter(tf, 'TF');
        const j = getLetter(jp, 'JP');
        const code = e + s + t + j;

        const letters = [e, s, t, j];
        const xCount = letters.filter(l => l === 'X').length;

        let name, desc, nickname;
        if (xCount > 0) {
            name = xTitles[xCount][0];
            desc = xTitles[xCount][1];
            nickname = xNicknames[xCount];
        } else {
            const p = personalityMap[code] || ['江湖异人', '身怀绝技，不落窠臼。'];
            name = p[0];
            desc = p[1];
            nickname = nicknameMap[code] || 'JIANGHU';
        }

        document.getElementById('nicknameBadge').textContent = nickname;
        document.getElementById('resultName').textContent = name;
        document.getElementById('resultDesc').textContent = desc;
        document.getElementById('dimensionDetail').innerHTML = `
            <div class="dim-item"><span class="dim-label">精力</span><span class="dim-value">${e}</span></div>
            <div class="dim-item"><span class="dim-label">认知</span><span class="dim-value">${s}</span></div>
            <div class="dim-item"><span class="dim-label">决策</span><span class="dim-value">${t}</span></div>
            <div class="dim-item"><span class="dim-label">处世</span><span class="dim-value">${j}</span></div>
        `;

        testArea.classList.add('hidden');
        resultArea.classList.remove('hidden');
    }

    // ========== 复制分享链接 ==========
    function copyShareLink() {
        const url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('🔗 链接已复制，快去分享给江湖好友！');
            }).catch(() => fallbackCopy(url));
        } else {
            fallbackCopy(url);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('🔗 链接已复制');
        } catch (e) {
            alert('复制失败，请手动复制网址');
        }
        document.body.removeChild(textarea);
    }

    // ========== 事件绑定 ==========
    nextBtn.addEventListener('click', () => {
        if (answers[currentIndex] === null) {
            showToast('请先选择一个选项');
            return;
        }
        if (currentIndex === 49) {
            calculateResult();
        } else {
            currentIndex++;
            renderQuestion(currentIndex);
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion(currentIndex);
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        answers.fill(null);
        currentIndex = 0;
        testArea.classList.remove('hidden');
        resultArea.classList.add('hidden');
        renderQuestion(0);
    });

    document.getElementById('shareLinkBtn').addEventListener('click', copyShareLink);

    // ========== 启动 ==========
    renderQuestion(0);
})();
</script>
</body>
</html>
